<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>奉納アーカイブ｜デジタル絵馬</title>
  <!-- 共通CSS：tech-shrineの共通デザインシステム -->
  <link rel="stylesheet" href="https://shimataiyaki.github.io/tech-shrine/css/common.css">
  <style>
    /* ===== 絵馬カード固有のスタイル ===== */
    .ema-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1.5rem;
      max-width: 1800px;
      margin: 20px auto;
      padding: 0 20px;
    }

    .ema-card {
      background-color: transparent;
      background-image: url('https://shimataiyaki.github.io/images/ema-card.jpg');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: top center;
      border: none;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 16px 12px;
      color: var(--text-color);
      width: 100%;
      aspect-ratio: 3 / 2;
      overflow: hidden;
    }

    .nickname {
      font-size: clamp(12px, 2vw, 16px);
      color: var(--accent-color);
      background: transparent;
      padding: 0;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--accent-color);
      max-width: 100%;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .wish {
      font-size: clamp(18px, 2.5vw, 26px);
      font-weight: 600;
      line-height: 1.3;
      background: transparent;
      padding: 0;
      max-width: 100%;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      white-space: normal;
      margin-bottom: 0.5rem;
    }

    .ema-time {
      font-size: clamp(11px, 1.5vw, 14px);
      color: var(--muted-text);
      margin-top: auto;
    }

    .empty-message {
      text-align: center;
      font-size: 1.2rem;
      color: var(--muted-text);
      padding: 3rem;
      grid-column: span 5;
    }

    /* ===== レスポンシブ ===== */
    @media screen and (max-width: 600px) {
      .ema-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }
      .nickname { font-size: 16px; }
      .wish { font-size: 22px; -webkit-line-clamp: 4; }
      .ema-card { padding: 12px 8px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-container">
    <div class="site-title-wrapper">
      <a href="./" class="site-title">デジタル絵馬</a>
      <span class="site-subtitle">E-MAs-archive</span>
    </div>
    <button class="menu-toggle" id="menuToggle" aria-label="メニュー" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul class="nav-menu" id="navMenu">
      <div class="nav-menu-inner">
        <li><a href="https://script.google.com/macros/s/AKfycbxdlsuwqo6uX8n_-zbYv-JFreS0w0w720FUxshtGNazav_4nxqUvAKTm-sEsK2NLw1ieQ/exec">トップ</a></li>
        <li><a href="https://note.com/shimataiyaki" target="_blank" rel="noopener">note</a></li>
        <li><a href="https://github.com/shimataiyaki/e-mas" target="_blank" rel="noopener">GitHub</a></li>
      </div>
    </ul>
  </div>
</header>

<div class="notification-banner">過去の想いを一覧でご覧いただけます</div>

<main class="archive-container">
  <h1>奉納アーカイブ</h1>
  <div class="ema-grid" id="archiveGrid"></div>
</main>

<footer class="site-footer">
  © 2026 Shimataiyaki
</footer>

<script>
  // ===== ハンバーガーメニュー =====
  const toggleBtn = document.getElementById('menuToggle');
  const navMenu = document.getElementById('navMenu');

  toggleBtn.addEventListener('click', function() {
    navMenu.classList.toggle('show');
    this.classList.toggle('active');
    this.setAttribute('aria-expanded', navMenu.classList.contains('show'));
  });

  document.addEventListener('click', function(e) {
    if (!toggleBtn.contains(e.target) && !navMenu.contains(e.target)) {
      navMenu.classList.remove('show');
      toggleBtn.classList.remove('active');
    }
  });

  // ===== データ取得と表示 =====
  const API_URL = 'https://script.google.com/macros/s/AKfycbwi0NXAZ_doCj7I7KuU0hk4wO65m4XcuGXotM795E1sXNjs5yC_HwxbEG4bemgzfd1a/exec'; // ★★★ デプロイ済みのGAS APIのURLに置き換えてください ★★★

  function formatDate(timestamp) {
    const d = new Date(timestamp);
    if (isNaN(d.getTime())) return timestamp;
    return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  async function loadArchive() {
    try {
      const response = await fetch(API_URL);
      if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
      const allWishes = await response.json();
      const grid = document.getElementById('archiveGrid');
      
      if (!allWishes || allWishes.length === 0) {
        if (grid.children.length === 0) {
          grid.innerHTML = '<div class="empty-message">まだ奉納された想いはありません。</div>';
        }
        return;
      }

      grid.innerHTML = '';
      allWishes.forEach(item => {
        const card = document.createElement('div');
        card.className = 'ema-card';

        const nicknameDiv = document.createElement('div');
        nicknameDiv.className = 'nickname';
        nicknameDiv.textContent = (item.nickname || '匿名') + ' さんの想い';

        const wishDiv = document.createElement('div');
        wishDiv.className = 'wish';
        wishDiv.textContent = item.wish;

        const timeP = document.createElement('p');
        timeP.className = 'ema-time';
        timeP.textContent = formatDate(item.timestamp);

        card.appendChild(nicknameDiv);
        card.appendChild(wishDiv);
        card.appendChild(timeP);
        grid.appendChild(card);
      });
    } catch (error) {
      console.error('アーカイブ読み込みエラー:', error);
      const grid = document.getElementById('archiveGrid');
      if (grid.children.length === 0) {
        grid.innerHTML = '<div class="empty-message">データの読み込みに失敗しました</div>';
      }
    }
  }

  loadArchive();
  setInterval(loadArchive, 45000); // 45秒ごとに更新
</script>
</body>
</html>
