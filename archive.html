<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <base target="_top">
  <title>奉納アーカイブ｜デジタル絵馬</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-color: #ffffff;
      --text-color: #1e293b;
      --border-color: #e2e8f0;
      --muted-text: #64748b;
      --accent-color: #ad241f;
    }

    body {
      font-family: '游明朝', 'Yu Mincho', 'Hiragino Mincho ProN', serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
      padding-top: 5rem;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 固定ヘッダー */
    .site-header {
      width: 100%;
      position: fixed;
      top: 0;
      left: 0;
      background-color: var(--bg-color);
      border-bottom: 3px solid var(--accent-color);
      z-index: 1000;
    }

    .header-container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-title {
      font-family: '游明朝', 'Yu Mincho', serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: #1e293b;
      text-decoration: none;
    }

    .menu-toggle {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      width: 32px;
      height: 28px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .menu-toggle span {
      width: 100%;
      height: 3px;
      background: var(--accent-color);
      transition: all 0.3s;
    }

    .menu-toggle.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }
    .menu-toggle.active span:nth-child(2) {
      opacity: 0;
    }
    .menu-toggle.active span:nth-child(3) {
      transform: rotate(-45deg) translate(6px, -7px);
    }

    .nav-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      background: var(--bg-color);
      border-bottom: 1px solid var(--border-color);
      padding: 1.5rem 0;
      list-style: none;
      z-index: 999;
    }

    .nav-menu.show {
      display: block;
    }

    .nav-menu-inner {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .nav-menu a {
      text-decoration: none;
      color: var(--text-color);
      font-size: 1.1rem;
      border-bottom: 2px solid transparent;
    }

    .nav-menu a:hover {
      color: var(--accent-color);
      border-bottom-color: var(--accent-color);
    }

    /* 通知バナー（アーカイブでは静的メッセージ） */
    .notification-banner {
      background: transparent;
      border-bottom: 1px solid var(--border-color);
      padding: 0.75rem 1.5rem;
      margin: 1rem 1.5rem 0;
      font-size: 1rem;
      color: var(--text-color);
      max-width: 1600px;
      margin-left: auto;
      margin-right: auto;
      width: calc(100% - 3rem);
    }

    h1 {
      font-family: '游明朝', 'Yu Mincho', serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 500;
      text-align: center;
      margin: 1.2rem 0 1.5rem;
      color: var(--accent-color);
      letter-spacing: 0.1em;
    }

    /* アーカイブグリッド */
    .archive-container {
      width: 100%;
      flex: 1;
      padding: 0 1.5rem 1.5rem;
    }

    .archive-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1.5rem;
      padding: 0.5rem 0;
    }

    /* 絵馬カード（メイン画面と共通） */
    .ema-card {
      background-color: transparent;
      background-image: url('https://shimataiyaki.github.io/images/ema-card.jpg');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: top center;
      border: none;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 16px 12px;
      color: var(--text-color);
      height: 100%;
      width: 100%;
      aspect-ratio: 3 / 2;
      overflow: hidden;
    }

    .nickname {
      font-size: clamp(12px, 2vw, 16px);
      color: var(--accent-color);
      background: transparent;
      padding: 0;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--accent-color);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .wish {
      font-size: clamp(18px, 2.5vw, 26px);
      font-weight: 600;
      line-height: 1.3;
      background: transparent;
      padding: 0;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      white-space: normal;
      margin-bottom: 0.5rem;
    }

    .ema-time {
      font-size: clamp(11px, 1.5vw, 14px);
      color: var(--muted-text);
      background: transparent;
      padding: 0;
      margin-top: auto;
    }

    .empty-message {
      text-align: center;
      font-size: 1.2rem;
      color: var(--muted-text);
      padding: 3rem;
      grid-column: span 5;
    }

    /* フッター */
    .site-footer {
      text-align: center;
      padding: 1rem 0;
      color: var(--muted-text);
      font-size: 0.85rem;
      border-top: 1px solid var(--border-color);
      background-color: var(--bg-color);
    }

    /* モバイル対応 */
    @media screen and (max-width: 600px) {
      body { padding-top: 4.5rem; }
      .header-container { padding: 0.5rem 1rem; }
      .site-title { font-size: 1.3rem; }
      .notification-banner {
        margin: 0.75rem 1rem;
        padding: 0.6rem 1rem;
        font-size: 0.9rem;
        width: calc(100% - 2rem);
      }
      .archive-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }
      .nickname { font-size: 16px; }
      .wish { font-size: 22px; -webkit-line-clamp: 4; }
      .ema-card { padding: 12px 8px; }
    }

    @media screen and (max-width: 400px) {
      .wish { font-size: 18px; }
      .nickname { font-size: 14px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-container">
    <a href="." class="site-title">デジタル絵馬</a>
    <button class="menu-toggle" id="menuToggle" aria-label="メニュー">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-menu" id="navMenu">
      <div class="nav-menu-inner">
        <li><a href=".">トップ</a></li>
        <li><a href="?page=archive">奉納アーカイブ</a></li>
        <li><a href="https://note.com/shimataiyaki" target="_blank">note</a></li>
        <li><a href="https://github.com/Shimataiyaki/digital-ema" target="_blank">GitHub</a></li>
      </div>
    </ul>
  </div>
</header>

 <h1>奉納アーカイブ</h1>
<!-- 静的バナー -->
<div class="notification-banner">過去の想いを一覧でご覧いただけます。</div>

<div class="archive-container">
  <div class="archive-grid" id="archiveGrid"></div>
</div>

<footer class="site-footer">
  © 2026 Shimataiyaki
</footer>

<script>
  const toggleBtn = document.getElementById('menuToggle');
  const navMenu = document.getElementById('navMenu');
  if (toggleBtn && navMenu) {
    toggleBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      navMenu.classList.toggle('show');
      toggleBtn.classList.toggle('active');
    });
    document.addEventListener('click', (e) => {
      if (!toggleBtn.contains(e.target) && !navMenu.contains(e.target)) {
        navMenu.classList.remove('show');
        toggleBtn.classList.remove('active');
      }
    });
  }

  function formatDate(timestamp) {
    const d = new Date(timestamp);
    return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function loadArchive() {
    google.script.run.withSuccessHandler(function(allWishes) {
      const grid = document.getElementById('archiveGrid');
      grid.innerHTML = '';

      if (!allWishes || allWishes.length === 0) {
        grid.innerHTML = '<div class="empty-message">まだ奉納された想いはありません。</div>';
        return;
      }

      allWishes.forEach(item => {
        const card = document.createElement('div');
        card.className = 'ema-card';

        const nicknameDiv = document.createElement('div');
        nicknameDiv.className = 'nickname';
        nicknameDiv.textContent = (item.nickname || '匿名') + ' さんの想い';

        const wishDiv = document.createElement('div');
        wishDiv.className = 'wish';
        wishDiv.textContent = item.wish;

        const timeP = document.createElement('p');
        timeP.className = 'ema-time';
        timeP.textContent = formatDate(item.timestamp);

        card.appendChild(nicknameDiv);
        card.appendChild(wishDiv);
        card.appendChild(timeP);
        grid.appendChild(card);
      });
    }).getAllWishes();
  }

  loadArchive();
  setInterval(loadArchive, 45000);  // 45秒ごとに自動更新
</script>
</body>
</html>
